version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ai-orchestrator-db
    environment:
      POSTGRES_USER: ai_orchestrator
      POSTGRES_PASSWORD: ai_orchestrator
      POSTGRES_DB: ai_orchestrator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_orchestrator -d ai_orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-orchestrator-web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://ai_orchestrator:ai_orchestrator@db:5432/ai_orchestrator
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:

